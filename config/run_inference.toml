cache_path = "../data.h5"
detectors = ["S1", "R1"]
sample_only = ["H0"]
seed = 1

# Optional. Relative paths are resolved against this TOML file's directory.
output_dir = "../output"
output_prefix = "chains"

[init]
H0 = 67.66
"Ωm" = 0.3096
"Ξ₀" = 1.0
"Ξₙ" = 1.91
"γ" = 2.7
"κ" = 5.7
zpeak = 2.0

[sampler]
# Keep these small for smoke tests; increase for real runs.
n_samples = 3000
n_adapts = 3000
target_acceptance = 0.9
# num_chains defaults to Base.Threads.nthreads().
# checkpoint_every = 0 disables intra-run checkpointing.
num_chains = 8
checkpoint_every = 500
