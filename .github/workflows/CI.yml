name: CI

on:
  push:
    branches:
      - main
      - master
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - name: Build and Test ASGWB
        run: |
          julia --project=ASGWB -e 'using Pkg; Pkg.instantiate(); Pkg.test()'
      - name: Build and Test ASGWBInference
        run: |
          julia --project=ASGWBInference -e 'using Pkg; Pkg.instantiate(); Pkg.test()'
